version: '3.8'

services:
#MLflow
  mlflow:
    build:
      context: ../
      dockerfile: docker/Dockerfile.mlflow
    container_name: spam_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_ARTIFACT_ROOT=/app/mlruns
      - MLFLOW_TRACKING_URI=sqlite:///app/mlflow.db 
    volumes:
      - ../mlruns:/app/mlruns
      - ../mlflow.db:/app/mlflow.db
    networks:
      - spam_network
    restart: unless-stopped
#API
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: spam_api
    hostname: api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - MLFLOW_TRACKING_URI=sqlite:///app/mlflow.db
    volumes:
      - ../src/api:/app/api
      - ../src/model:/app/model
      - ../mlruns:/app/mlruns
      - ../mlflow.db:/app/mlflow.db
    networks:
      - spam_network
    restart: unless-stopped
#Interface
  streamlit:
    build:
      context: ../
      dockerfile: docker/Dockerfile.streamlit
    container_name: spam_streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/predict
    volumes:
      - ../src/streamlit:/app/streamlit
    networks:
      - spam_network
    depends_on:
      - api
    restart: unless-stoppedcl

networks:
  spam_network:
    driver: bridge
    name: spam_network