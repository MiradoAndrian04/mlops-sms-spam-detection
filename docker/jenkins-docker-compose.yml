version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:latest
    container_name: spam_jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - C:/Users/mirad/Desktop/Etudes/M1/Docker/ProjetCICD:/app/projet
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:
    driver: local
    name: spam_jenkins_home